tables:
  - name: customer_data
    sql: {{ load_sql('customer_data') }}
    description: "The customer_data table stores information about customers."

    dimensions:
      - name: customer_id
        type: number
        column: customer_id

      - name: birth_year
        type: number
        column: birth_year

      - name: education
        type: string
        column: education

      - name: marital_status
        type: string
        column: marital_status

      - name: income
        type: number
        column: income

      - name: country
        type: string
        column: country

      - name: created_at
        type: time
        column: created_at

    measures:
      - name: total_customers
        sql: "COUNT({customer_id})"
        type: count

      - name: unique_countries
        sql: "COUNT(DISTINCT {country})"
        type: count_distinct

      - name: average_income
        sql: "AVG({income})"
        type: avg

    segments:
      - name: high_income_customers
        sql: "{income} > 50000"
        description: "Customers with income > 50k"

      - name: married_customers
        sql: "{marital_status} = 'married'"
        description: "Customers who are married"

      - name: us_customers
        sql: "{country} = 'US'"
        description: "Customers from US"